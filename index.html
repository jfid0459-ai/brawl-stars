<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getMessaging, getToken, onMessage } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging.js";

    authDomain: "brwsl-stars-landingue-pages.firebaseapp.com",
    projectId: "brwsl-stars-landingue-pages",

  };

  const app = initializeApp(firebaseConfig);
  const messaging = getMessaging(app);
  const db = getFirestore(app);

  const VAPID_KEY = 'BJvz64R0okX8JCnSDfDo2BP7w82BQAeinN4LjfRvRbXCZBO3Rm01GIKfB4-5q3MJ-K-c7zYdh09TbyX0vFpqONM';

  // هادي دالة باش تجرب واش الكود خدام
  async function start() {
      try {
          alert("1. بدء طلب الإذن..."); // واش هادي بانت؟
          
          const permission = await Notification.requestPermission();
          
          if (permission === 'granted') {
              alert("2. تم السماح! جاري جلب التوكن..."); 

              const registration = await navigator.serviceWorker.register('/firebase-messaging-sw.js');
              const token = await getToken(messaging, {
                  vapidKey: VAPID_KEY,
                  serviceWorkerRegistration: registration
              });

              if (token) {
                  alert("3. التوكن موجود! جاري الحفظ...");
                  
                  await addDoc(collection(db, "subscribers"), {
                      token: token,
                      date: new Date().toISOString()
                  });
                  
                  alert("4. ✅ صافي تسجل في Database!");
              } else {
                  alert("❌ مشكل: ما قدرناش نجيبو التوكن");
              }
          } else {
              alert("❌ تم رفض الإذن");
          }
      } catch (err) {
          alert("🚨 خطأ خطير: " + err.message);
          console.error(err);
      }
  }

  // تشغيل الكود
  start();
</script>
