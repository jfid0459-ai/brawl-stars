<!-- 🔥 هذا هو الكود الصحيح للحفظ في Firestore 🔥 -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getMessaging, getToken } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging.js";
  import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAnqXUdPWtXJKoxfV29xapEjwV-FsQzEas",
    authDomain: "brwsl-stars-landingue-pages.firebaseapp.com",
    projectId: "brwsl-stars-landingue-pages",
    storageBucket: "brwsl-stars-landingue-pages.firebasestorage.app",
    messagingSenderId: "554122864381",
    appId: "1:554122864381:web:f6487c4a551ebc8e3fc094"
  };

  const app = initializeApp(firebaseConfig);
  const messaging = getMessaging(app);
  const db = getFirestore(app);

  const VAPID_KEY = 'BJvz64R0okX8JCnSDfDo2BP7w82BQAeinN4LjfRvRbXCZBO3Rm01GIKfB4-5q3MJ-K-c7zYdh09TbyX0vFpqONM';

  async function start() {
      try {
          console.log("Starting...");
          
          // 1. Talab l-idzn (Permission)
          const permission = await Notification.requestPermission();
          if (permission !== 'granted') {
              alert("❌ Khass t3ti l-mowafa9a bach t-wslk notification.");
              return;
          }

          // 2. Register Service Worker (Hadi li kan fiha l-mochkil)
          // Zidna no9ta (.) bach y9leb f dossier nfsso
          const registration = await navigator.serviceWorker.register('./firebase-messaging-sw.js');
          console.log("Service Worker Registered");

          // 3. Jib Token
          const token = await getToken(messaging, {
              vapidKey: VAPID_KEY,
              serviceWorkerRegistration: registration
          });

          if (token) {
              console.log("Token:", token);
              
              // 4. Sifet l Firestore
              await addDoc(collection(db, "subscribers"), {
                  token: token,
                  date: new Date().toISOString(),
                  userAgent: navigator.userAgent // Zidt hadi bach t3rf mn ina device
              });
              
      }

      } catch (err) {
          console.error("Error:", err);
          alert("🚨 W9e3 mochkil: " + err.message);
      }
  }

  // L-bouton li kaybda l-3amaliya (ila knti baghiha b click)
  // awla khlliha tkhdm direct:
  start(); 
</script>
