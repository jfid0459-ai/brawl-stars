<!-- 🔥 هذا هو الكود الصحيح للحفظ في Firestore 🔥 -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getMessaging, getToken } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging.js";
  import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAnqXUdPWtXJKoxfV29xapEjwV-FsQzEas",
    authDomain: "brwsl-stars-landingue-pages.firebaseapp.com",
    projectId: "brwsl-stars-landingue-pages",
    storageBucket: "brwsl-stars-landingue-pages.firebasestorage.app",
    messagingSenderId: "554122864381",
    appId: "1:554122864381:web:f6487c4a551ebc8e3fc094"
  };

  const app = initializeApp(firebaseConfig);
  const messaging = getMessaging(app);
  const db = getFirestore(app);

  const VAPID_KEY = 'BJvz64R0okX8JCnSDfDo2BP7w82BQAeinN4LjfRvRbXCZBO3Rm01GIKfB4-5q3MJ-K-c7zYdh09TbyX0vFpqONM';

    async function start() {
      try {
          const permission = await Notification.requestPermission();
          
          if (permission === 'granted') {
              // 1. Enregistri Service Worker b 'scope' bach y3rf fin ykhdm
              // Zidna { scope: './' } bach yfhem annah f dossier dyal brawl-stars
              const registration = await navigator.serviceWorker.register('./firebase-messaging-sw.js', { scope: './' });

              // 2. Tsna Service Worker ta ykon WAJED (Ready)
              // Hada howa l-7el dyal "No active Service Worker"
              await navigator.serviceWorker.ready;

              console.log("Service Worker wjed ✅");

              // 3. Jib Token daba
              const token = await getToken(messaging, {
                  vapidKey: VAPID_KEY,
                  serviceWorkerRegistration: registration
              });

              if (token) {
                  await addDoc(collection(db, "subscribers"), {
                      token: token,
                      date: new Date().toISOString(),
                      userAgent: navigator.userAgent
                  });
                  console.log("✅ Token tsifet l Database!");
              }
          } else {
              console.log("❌ Permission denied.");
          }
      } catch (err) {
          // Hna ghadi nwerik l-ghalat b dbt ila kan l-fichier mal9ahch
          alert("🚨 Mochkil: " + err.message); 
          console.error(err);
      }
  }

  start();
